{% extends 'base_publica.html' %}

{% block titulo %}Login — GameStore{% endblock %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card auth-card">
            <div class="card-header-game text-center py-3">
                <h4 class="mb-0 fw-bold">🎮 Entrar no Sistema</h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('login') }}" method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email"
                               placeholder="seu@email.com" required>
                    </div>
                    <div class="mb-4">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" name="senha"
                               placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-game w-100 mb-3">Entrar →</button>
                    <p class="text-center text-muted small mb-0">
                        Não tem conta? <a href="{{ url_for('cadastro') }}" class="link-game">Cadastre-se</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
