{% extends 'base.html' %}

{% block titulo %}Novo Usuário — GameStore{% endblock %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card">
            <div class="card-header-game py-3 px-4">
                <h5 class="mb-0 fw-bold">👤 Cadastrar Novo Usuário</h5>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('inserir_usuario') }}" method="post">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome completo</label>
                        <input type="text" class="form-control" id="nome" name="nome"
                               placeholder="Ex: João Silva" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email"
                               placeholder="Ex: joao@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="perfil" class="form-label">Perfil de acesso</label>
                        <select class="form-select" id="perfil" name="perfil" required>
                            <option value="" disabled selected>Selecione um perfil...</option>
                            <option value="Admin">Admin</option>
                            <option value="Moderador">Moderador</option>
                            <option value="Colecionador">Colecionador</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label for="senha" class="form-label">Senha inicial</label>
                        <input type="password" class="form-control" id="senha" name="senha"
                               placeholder="Mínimo 6 caracteres" required minlength="6">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-game">💾 Salvar</button>
                        <a href="{{ url_for('listar_usuarios') }}" class="btn btn-outline-secondary">✖ Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
