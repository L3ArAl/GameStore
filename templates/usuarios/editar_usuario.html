{% extends 'base.html' %}

{% block titulo %}Editar Usuário — GameStore{% endblock %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card">
            <div class="card-header-game py-3 px-4">
                <h5 class="mb-0 fw-bold">✏️ Editar Usuário</h5>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('editar_usuario', uid=usuario.id) }}" method="post">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome completo</label>
                        <input type="text" class="form-control" id="nome" name="nome"
                               value="{{ usuario.nome }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email"
                               value="{{ usuario.email }}" required>
                    </div>
                    <div class="mb-4">
                        <label for="perfil" class="form-label">Perfil de acesso</label>
                        <select class="form-select" id="perfil" name="perfil" required>
                            <option value="Admin"        {% if usuario.perfil == 'Admin' %}selected{% endif %}>Admin</option>
                            <option value="Moderador"   {% if usuario.perfil == 'Moderador' %}selected{% endif %}>Moderador</option>
                            <option value="Colecionador" {% if usuario.perfil == 'Colecionador' %}selected{% endif %}>Colecionador</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-game">💾 Salvar alterações</button>
                        <a href="{{ url_for('listar_usuarios') }}" class="btn btn-outline-secondary">✖ Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
