{% extends 'base.html' %}

{% block titulo %}Editar Plataforma — GameStore{% endblock %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card">
            <div class="card-header-game py-3 px-4">
                <h5 class="mb-0 fw-bold">✏️ Editar Plataforma</h5>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('editar_plataforma', pid=plataforma.id) }}" method="post">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome da plataforma</label>
                        <input type="text" class="form-control" id="nome" name="nome"
                               value="{{ plataforma.nome }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="fabricante" class="form-label">Fabricante</label>
                        <input type="text" class="form-control" id="fabricante" name="fabricante"
                               value="{{ plataforma.fabricante }}" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="tipo" class="form-label">Tipo</label>
                            <select class="form-select" id="tipo" name="tipo" required>
                                {% for t in ['Console','Hibrido','Computador','Portatil','Mobile'] %}
                                <option value="{{ t }}" {% if plataforma.tipo == t %}selected{% endif %}>{{ t }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="ano_lancamento" class="form-label">Ano de lançamento</label>
                            <input type="number" class="form-control" id="ano_lancamento" name="ano_lancamento"
                                   value="{{ plataforma.ano_lancamento }}" min="1970" max="2030" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="jogos_disponiveis" class="form-label">Nº de jogos disponíveis</label>
                        <input type="number" class="form-control" id="jogos_disponiveis" name="jogos_disponiveis"
                               value="{{ plataforma.jogos_disponiveis }}" min="0">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-game">💾 Salvar alterações</button>
                        <a href="{{ url_for('listar_plataformas') }}" class="btn btn-outline-secondary">✖ Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
